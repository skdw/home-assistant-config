- id: 'media_sound_mode'
  alias: Sound Mode update
  mode: single
  triggers:
  - entity_id: input_select.sound_mode
    trigger: state
  variables:
    sound_mode_value:
      'Auto':     AUTO SURROUND
      'Extended': ALL CH STEREO
      'Surround': DOLBY ATMOS
      'Desk':     FULL MONO
    cmt_data: # Audio Muting by Channel
      'Auto':     {}
      'Extended': {}
      'Surround': {}
      'Desk':
        front_right: true
        center: true
        surround_right: true
    tcl_data: # Temporary Channel Level
      'Auto':
        center: 2
        surround_left: -1
        subwoofer: -1
      'Extended':
        front_left: -12
        center: 2
        surround_left: 14
        surround_right: 10
        subwoofer: -4
      'Surround':
        center: 2
        surround_left: -1
        subwoofer: -1
      'Desk':
        front_right: -1
        center: 2
        surround_left: 16
        subwoofer: -4
  actions:
  - action: media_player.select_sound_mode
    data:
      entity_id: media_player.pioneer_onkyo
      sound_mode: "{{ sound_mode_value[trigger.to_state.state] }}"
  - action: media_player.onkyo_set_channel_muting
    data:
      entity_id: media_player.pioneer_onkyo
      channels: "{{ cmt_data[trigger.to_state.state] }}"
  - action: media_player.onkyo_set_temporary_channel_level
    data:
      entity_id: media_player.pioneer_onkyo
      channel_levels: "{{ tcl_data[trigger.to_state.state] }}"
